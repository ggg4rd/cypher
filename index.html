<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_STATION_7_SECURE</title>
    <style>
        :root {
            --crt-green: #33ff33;
            --crt-bg: #080a08;
            --glow: 0 0 10px rgba(51, 255, 51, 0.5);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            width: 100vw; height: 100vh;
            overflow: hidden;
            color: var(--crt-green);
            font-family: 'Courier New', Courier, monospace;
            /* 改善選取體驗 */
            selection-background-color: var(--crt-green);
            selection-color: #000;
        }

        /* --- CRT 視覺強化層 --- */
        .crt-screen {
            width: 100%; height: 100%;
            background: var(--crt-bg);
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
            position: relative;
            animation: flicker 0.15s infinite;
        }

        .crt-screen::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 100; pointer-events: none;
        }

        .crt-screen::after {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 101;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8) 150%);
            z-index: 102; pointer-events: none;
        }

        @keyframes flicker {
            0% { opacity: 0.98; } 50% { opacity: 1.0; } 100% { opacity: 0.99; }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); opacity: 0.05; }
            10% { opacity: 0.1; }
            100% { transform: translateY(100%); opacity: 0.05; }
        }

        #terminal-log {
            white-space: pre-wrap;
            line-height: 1.5;
            text-shadow: 2px 0 1px rgba(255,0,0,0.2), -2px 0 1px rgba(0,0,255,0.2), 0 0 5px #00ff41;
            /* 允許選取文字 */
            user-select: text;
            -webkit-user-select: text;
        }

        .input-line {
            display: flex;
            align-items: center;
            text-shadow: 0 0 5px #00ff41;
            margin-top: 10px;
        }

        .prompt { color: var(--crt-green); margin-right: 10px; font-weight: bold; }

        input {
            background: transparent; border: none; color: var(--crt-green);
            font-family: inherit; font-size: 1.1rem; flex: 1;
            outline: none; text-shadow: inherit;
        }
    </style>
</head>
<body id="terminal-body">

<div class="vignette"></div>
<div class="crt-screen" id="screen">
    <div id="terminal-log">STATION-7 SECURE TERMINAL v6.0.4
ESTABLISHED ENCRYPTED UPLINK... OK
SYSTEM DATE: MARCH 20, 2026
--------------------------------------------------
TYPE 'help' FOR COMMAND LIST.
--------------------------------------------------</div>
    
    <div class="input-line" id="current-input-line">
        <span class="prompt">agent@station-7:~$</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off">
    </div>
</div>

<audio id="audio-E01" loop><source src="AFTER YOU GET WHAT YOU WANT YOU DON'T WANT  - EDDIE NELSON.mp3" type="audio/mpeg"></audio>
<audio id="audio-E02" loop><source src="16 - German Man.mp3" type="audio/mpeg"></audio>
<audio id="audio-E03" loop><source src="Cherry_Ripe_(number_station).mp3" type="audio/mpeg"></audio>
<audio id="audio-E04" loop><source src="freesound_community-fm-radio-static-82334.mp3" type="audio/mpeg"></audio>
<audio id="audio-E05" loop><source src="20 - 2 Letter 'YS'.mp3" type="audio/mpeg"></audio>
<audio id="audio-E06" loop><source src="06 - The Lincolnshire Poacher.mp3" type="audio/mpeg"></audio>
<audio id="audio-E07" loop><source src="I DON'T WANT TO WALK WITHOUT - DON PABLO and his ORCHESTRA.mp3" type="audio/mpeg"></audio>
<script>
    const input = document.getElementById('cmd-input');
    const log = document.getElementById('terminal-log');
    const screen = document.getElementById('screen');
    const body = document.getElementById('terminal-body');
    
    let currentActiveAudio = null;
    let radioInterval = null;

    // 解決問題 2: 點擊 body 時，若無選取文字則聚焦
    body.addEventListener('click', () => {
        const selection = window.getSelection().toString();
        if (!selection) {
            input.focus();
        }
    });

    const SECRET_HEX = "7b2d3c307a2c2a3964282b3b222374322e322a567827555038581740222f39402212214a2726177d23353b3b422d761f39222e2f2568060e"; 
    const FILES = {
        'message.enc': `[ENCRYPTED DATA STREAM]\n${SECRET_HEX}`,
        'sys.log': "10:14 - Signal intercepted.\n10:15 - Logic gate locked.\n",
        'emergency.txt': "BURN NOTICE: DESTROY PAD AFTER READING."
    };

    const stations = {
        '-E01': { id: 'audio-E01', name: 'STATION E01' },
        '-E02': { id: 'audio-E02', name: 'STATION E02' },
        '-E03': { id: 'audio-E03', name: 'STATION E03' },
        '-E04': { id: 'audio-E04', name: 'STATION E04' },
        '-E05': { id: 'audio-E05', name: 'STATION E05' },
        '-E06': { id: 'audio-E06', name: 'STATION E06' },
        '-E07': { id: 'audio-E07', name: 'STATION E07' },
        // 若要支援 -E04，請在此新增： '-E04': { id: 'audio-E04', name: 'STATION E04' }
	
    };

    const commands = {
        'help': "AVAILABLE COMMANDS:\n  ls        - List directory files\n  cat [f]   - Display file content\n  decrypt   - Run XOR engine (Usage: decrypt [key])\n  radio     - Toggle Numbers Station (Usage: radio -[station])\n  clear     - Clear terminal buffer\n  whoami    - Display current user info\n  exit      - Close session",
        'ls': () => Object.keys(FILES).join("    "),
        'whoami': "AUTHORIZED AGENT: #8802\nSECURITY LEVEL: 5 (TOP SECRET)",
        'clear': "CLEAR",
        'cat': (filename) => FILES[filename] || `cat: ${filename}: No such file or directory`,
        'radio': (arg) => {
            if (!arg) {
                if (currentActiveAudio) {
                    stopRadio();
                    return "RECEIVER DEACTIVATED.";
                }
                return "ERROR: CODE REQUIRED";
            }
            const station = stations[arg.toUpperCase()];
            if (station) {
                return playRadio(station);
            } else {
                return `ERROR: UNKNOWN FREQUENCY [${arg}]`;
            }
        },
        'decrypt': (key) => {
            if (!key) return "ERROR: KEY REQUIRED";
            runXOR(key.toUpperCase());
            return "INITIALIZING DECRYPTION MODULE...";
        }
    };

    function playRadio(station) {
        if (currentActiveAudio) stopRadio();
        const audio = document.getElementById(station.id);
        if (audio) {
            audio.play().catch(e => console.log("Interaction required."));
            currentActiveAudio = audio;
            startRadioAnimation(station.name);
            return null; 
        }
        return "ERROR: HARDWARE FAILURE.";
    }

    function stopRadio() {
        if (currentActiveAudio) {
            currentActiveAudio.pause();
            currentActiveAudio.currentTime = 0;
            currentActiveAudio = null;
        }
        if (radioInterval) {
            clearInterval(radioInterval);
            radioInterval = null;
        }
    }

    function startRadioAnimation(stationName) {
        // 先清除之前的動畫
        if (radioInterval) clearInterval(radioInterval);
        
        let dots = 0;
        const techInfo = `\nACTIVATING SHORTWAVE RECIEVER...\n[Tuning...] SUCCESS.\nSIGNAL STRENGTH: WEAK\nFREQUENCY: CLASSIFIED`;
        log.innerText += techInfo + "\nMONITORING SHORTWAVE";
        
        radioInterval = setInterval(() => {
            dots = (dots + 1) % 4;
            const dotStr = ".".repeat(dots);
            const lines = log.innerText.split('\n');
            // 只在「最後一行」確實是監測訊息時才更新
            if (lines[lines.length - 1].startsWith("MONITORING SHORTWAVE")) {
                lines[lines.length - 1] = `MONITORING SHORTWAVE${dotStr}`;
                log.innerText = lines.join('\n');
                screen.scrollTop = screen.scrollHeight;
            }
        }, 500);
    }

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            // 解決問題 1: 一旦執行新指令，停止之前的 radio 文字動畫
            if (radioInterval) {
                clearInterval(radioInterval);
                radioInterval = null;
            }

            const fullVal = input.value;
            const parts = fullVal.trim().split(' ');
            const cmd = parts[0].toLowerCase();
            const arg = parts.slice(1).join(' ');

            log.innerText += `\nagent@station-7:~$ ${fullVal}`;
            
            if (cmd === 'clear') {
                log.innerText = "STATION-7 REBOOTED...";
            } else if (commands[cmd]) {
                const result = (typeof commands[cmd] === 'function') ? commands[cmd](arg) : commands[cmd];
                if (result) log.innerText += "\n" + result;
            } else if (cmd !== "") {
                log.innerText += `\nbash: ${cmd}: command not found`;
            }

            input.value = "";
            screen.scrollTop = screen.scrollHeight;
        }
    });

    async function runXOR(key) {
    log.innerText += `\n> LOADING KEYSTREAM: [ ${key} ]`;
    const cBytes = [];
    for(let i=0; i<SECRET_HEX.length; i+=2) cBytes.push(parseInt(SECRET_HEX.substr(i, 2), 16));
    const kBytes = new TextEncoder().encode(key);

    let result = "";
    log.innerText += "\n--------------------------------------------------";
    
    // 執行逐位元 XOR 運算過程
    for(let i=0; i<cBytes.length; i++) {
        const kByte = kBytes[i % kBytes.length];
        const resChar = String.fromCharCode(cBytes[i] ^ kByte);
        result += resChar;
        
        log.innerText += `\nOFFSET [${i.toString().padStart(2,'0')}] : 0x${cBytes[i].toString(16).toUpperCase()} ^ '${String.fromCharCode(kByte)}' => '${resChar}'`;
        
        screen.scrollTop = screen.scrollHeight;
        await new Promise(r => setTimeout(r, 50));
    }

    // 直接輸出結果，由玩家自行判斷是否正確
    log.innerText += "\n--------------------------------------------------";
    log.innerText += `\n[DECRYPTION COMPLETE] OUTPUT STREAM:\n>>> ${result} <<<`;
    screen.scrollTop = screen.scrollHeight;
}
</script>
</body>
</html>
